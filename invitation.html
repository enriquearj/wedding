<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación - Gabriela & Alejandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --cream:      #fafcf2;
      --green-dark: #768566;
      --green-mid:  #6b8f5e;
      --gold:       #d4af37;
      --text-dark:  #161515;
      --text-mid:   #5a5a5a;
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    /* Leaf decorations */
    .leaf {
      position: fixed;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      z-index: 0;
      -webkit-mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
      mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
    }
    .leaf.tl { top: 0; left: 0;  width: 56%; transform: none; }
    .leaf.tr { top: 0; right: 0; width: 56%; transform: scaleX(-1); }
    .leaf.bl { bottom: 0; left: 0;  width: 50%; transform: rotate(180deg) scaleX(-1); }
    .leaf.br { bottom: 0; right: 0; width: 50%; transform: rotate(180deg); }

    /* Envelope Wrapper */
    .envelope-wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
      height: 240px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    /* Envelope Base */
    .envelope {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #5d7a57 0%, #768566 100%);
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      overflow: visible;
    }

    .envelope::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 8px;
      pointer-events: none;
    }

    /* Envelope Bottom (Body) */
    .envelope-body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(135deg, #5d7a57 0%, #768566 100%);
      border-radius: 0 0 8px 8px;
      z-index: 5;
    }

    /* Left Flap */
    .flap-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, #768566, #5d7a57);
      clip-path: polygon(0 0, 100% 50%, 100% 100%, 0 100%);
      transform-origin: left center;
      transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 3;
      box-shadow: inset 2px 2px 8px rgba(0, 0, 0, 0.2);
    }

    .envelope-wrapper.opened .flap-left {
      transform: rotateY(-120deg);
    }

    /* Right Flap */
    .flap-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to left, #768566, #5d7a57);
      clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%);
      transform-origin: right center;
      transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 3;
      box-shadow: inset -2px 2px 8px rgba(0, 0, 0, 0.2);
    }

    .envelope-wrapper.opened .flap-right {
      transform: rotateY(120deg);
    }

    /* Back Flap (solapa trasera) */
    .flap-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 45%;
      background: linear-gradient(to bottom, #768566, #5d7a57);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      transform-origin: top center;
      transition: transform 0.5s ease-out 0.2s;
      z-index: 2;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .envelope-wrapper.opened .flap-back {
      transform: rotateX(180deg);
    }

    /* Seal */
    .seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #f4d03f, #d4af37 40%, #c9a227 80%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 12px 28px rgba(212, 175, 55, 0.4), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
      color: #2c2c2c;
      font-weight: bold;
      z-index: 6;
      animation: floatSeal 3s ease-in-out infinite;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -58px); }
    }

    /* CTA Text */
    .cta-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 7;
      white-space: nowrap;
      font-weight: 300;
    }

    /* Letter Inside */
    .letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 95%;
      max-width: 340px;
      height: 200px;
      background: var(--cream);
      border-radius: 6px;
      padding: 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
      z-index: 1;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transition: opacity 0.4s ease 0.8s;
    }

    .envelope-wrapper.opened .letter {
      opacity: 1;
    }

    .letter h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--green-dark);
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .letter p {
      font-family: 'Luxurious Script', cursive;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      color: var(--gold);
      margin: 5px 0;
    }

    .letter .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      color: var(--text-mid);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* Dashed lines */
    .dashed-line {
      position: absolute;
      width: 70%;
      height: 1px;
      left: 50%;
      transform: translateX(-50%);
      background: repeating-linear-gradient(to right, rgba(255,255,255,0.4) 0px, rgba(255,255,255,0.4) 4px, transparent 4px, transparent 8px);
      z-index: 4;
    }

    .dashed-line-1 { bottom: 58%; }
    .dashed-line-2 { bottom: 28%; }

    /* Subtitle */
    .subtitle-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--text-mid);
      letter-spacing: 0.1em;
    }

    .subtitle-text strong {
      color: var(--green-dark);
      font-weight: 600;
    }

    /* Loader */
    .loader {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
    }

    .loader.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(118, 133, 102, 0.2);
      border-top: 4px solid var(--green-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .envelope-wrapper {
        max-width: 300px;
        height: 200px;
      }

      .letter {
        padding: 20px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <!-- Leaf decorations -->
  <img class="leaf tl" src="img/leaves.png" alt="" />
  <img class="leaf tr" src="img/leaves.png" alt="" />
  <img class="leaf bl" src="img/leaves.png" alt="" />
  <img class="leaf br" src="img/leaves.png" alt="" />

  <!-- Main Container -->
  <div class="container">
    <!-- Envelope -->
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope">
        <!-- Back Flap -->
        <div class="flap-back"></div>

        <!-- Left Flap -->
        <div class="flap-left"></div>

        <!-- Right Flap -->
        <div class="flap-right"></div>

        <!-- Body -->
        <div class="envelope-body"></div>

        <!-- Dashed Lines -->
        <div class="dashed-line dashed-line-1"></div>
        <div class="dashed-line dashed-line-2"></div>

        <!-- Seal -->
        <div class="seal">✦</div>

        <!-- CTA Text -->
        <div class="cta-text">CLICK PARA ABRIR</div>

        <!-- Letter Inside -->
        <div class="letter">
          <h2>NUESTRA BODA</h2>
          <p>Gabriela & Alejandro</p>
          <p class="date">24 - AGOSTO - 2025</p>
        </div>
      </div>
    </div>

    <!-- Subtitle -->
    <p class="subtitle-text">Hemos reservado <strong>2</strong> lugares en su honor</p>
  </div>

  <!-- Loading spinner -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <script>
    const envelopeWrapper = document.getElementById('envelopeWrapper');
    const loader = document.getElementById('loader');
    let isOpened = false;

    // Redirect URL
    const redirectUrl = 'index.html';

    envelopeWrapper.addEventListener('click', function() {
      if (!isOpened) {
        isOpened = true;
        envelopeWrapper.classList.add('opened');
        loader.classList.add('show');

        // Redirect after animation
        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 2000);
      }
    });

    // Add hover effect
    envelopeWrapper.addEventListener('mouseenter', function() {
      if (!isOpened) {
        envelopeWrapper.style.transform = 'scale(1.05)';
        envelopeWrapper.style.transition = 'transform 0.3s ease';
      }
    });

    envelopeWrapper.addEventListener('mouseleave', function() {
      if (!isOpened) {
        envelopeWrapper.style.transform = 'scale(1)';
      }
    });
  </script>
</body>
</html>
