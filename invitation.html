<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación - Gabriela & Alejandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --cream:      #fafcf2;
      --green-dark: #768566;
      --green-mid:  #6b8f5e;
      --gold:       #d4af37;
      --text-dark:  #161515;
      --text-mid:   #5a5a5a;
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 641px) {
      body { 
        box-shadow: 0 0 40px rgba(0,0,0,0.15); 
      }
    }

    /* Leaf decorations */
    .leaf {
      position: fixed;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      z-index: 0;
      -webkit-mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
      mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
    }
    .leaf.tl { top: 0; left: 0;  width: 56%; transform: none; }
    .leaf.tr { top: 0; right: 0; width: 56%; transform: scaleX(-1); }
    .leaf.bl { bottom: 0; left: 0;  width: 50%; transform: rotate(180deg) scaleX(-1); }
    .leaf.br { bottom: 0; right: 0; width: 50%; transform: rotate(180deg); }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    /* Envelope Container */
    .envelope-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    .envelope-3d {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .envelope-3d.opened {
      transform: rotateX(-180deg);
    }

    /* Envelope Front (Closed) */
    .envelope-front {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #5d7a57 0%, #768566 100%);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 30px;
      overflow: hidden;
    }

    .envelope-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Flap */
    .flap {
      position: absolute;
      width: 100%;
      height: 50%;
      top: 0;
      left: 0;
      background: linear-gradient(to bottom, #768566, #5d7a57);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.7s ease-out 0.1s;
      transform: rotateX(0deg);
      z-index: 10;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .envelope-3d.opened .flap {
      transform: rotateX(180deg);
    }

    /* Seal */
    .seal-wrapper {
      position: relative;
      z-index: 15;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatSeal 3s ease-in-out infinite;
    }

    .seal {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #f4d03f, #d4af37 40%, #c9a227 80%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
      color: #2c2c2c;
      font-weight: bold;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* CTA Text */
    .cta-text {
      position: relative;
      z-index: 15;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 3vw, 1rem);
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 300;
    }

    /* Envelope Back (Content) */
    .envelope-back {
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--cream);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: rotateX(180deg);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), inset 2px 2px 5px rgba(0, 0, 0, 0.05);
      padding: 30px;
      text-align: center;
      flex-direction: column;
      gap: 15px;
    }

    .envelope-back h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--green-dark);
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .envelope-back p {
      font-family: 'Luxurious Script', cursive;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      color: var(--gold);
    }

    .envelope-back .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: var(--text-mid);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Subtitle below */
    .subtitle-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--text-mid);
      margin-top: 20px;
      letter-spacing: 0.1em;
    }

    .subtitle-text strong {
      color: var(--green-dark);
      font-weight: 600;
    }

    /* Loader */
    .loader {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
    }

    .loader.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(118, 133, 102, 0.2);
      border-top: 4px solid var(--green-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Dashed decoration lines */
    .dashed-lines {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3) 20%, rgba(255,255,255,0.3) 80%, transparent);
      background-size: 8px 100%;
      z-index: 5;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .envelope-container {
        max-width: 300px;
        height: 200px;
      }

      .envelope-front, .envelope-back {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Leaf decorations -->
  <img class="leaf tl" src="img/leaves.png" alt="" />
  <img class="leaf tr" src="img/leaves.png" alt="" />
  <img class="leaf bl" src="img/leaves.png" alt="" />
  <img class="leaf br" src="img/leaves.png" alt="" />

  <!-- Main Container -->
  <div class="container">
    <!-- Envelope 3D -->
    <div class="envelope-container" id="envelopeContainer">
      <div class="envelope-3d" id="envelope3d">
        
        <!-- FRONT (Closed Envelope) -->
        <div class="envelope-front">
          <div class="flap"></div>
          <div class="dashed-lines"></div>
          
          <div class="seal-wrapper">
            <div class="seal">✦</div>
          </div>
          
          <div class="cta-text">CLICK PARA ABRIR LA INVITACIÓN</div>
        </div>

        <!-- BACK (Inside) -->
        <div class="envelope-back">
          <h2>NUESTRA BODA</h2>
          <p>Gabriela & Alejandro</p>
          <p class="date">24 - AGOSTO - 2025</p>
        </div>

      </div>
    </div>

    <!-- Subtitle -->
    <p class="subtitle-text">Hemos reservado <strong>2</strong> lugares en su honor</p>
  </div>

  <!-- Loading spinner -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <script>
    const envelopeContainer = document.getElementById('envelopeContainer');
    const envelope3d = document.getElementById('envelope3d');
    const loader = document.getElementById('loader');
    let isOpened = false;

    // Redirect URL
    const redirectUrl = 'index.html';

    envelopeContainer.addEventListener('click', function(e) {
      if (!isOpened) {
        isOpened = true;
        envelope3d.classList.add('opened');
        loader.classList.add('show');

        // Redirect after animation
        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 1200);
      }
    });

    // Add hover effect
    envelopeContainer.addEventListener('mouseenter', function() {
      if (!isOpened) {
        envelopeContainer.style.transform = 'scale(1.03)';
        envelopeContainer.style.transition = 'transform 0.3s ease';
      }
    });

    envelopeContainer.addEventListener('mouseleave', function() {
      if (!isOpened) {
        envelopeContainer.style.transform = 'scale(1)';
      }
    });
  </script>
</body>
</html>
