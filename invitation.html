<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación - Gabriela & Alejandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --cream:      #fafcf2;
      --green-dark: #768566;
      --green-mid:  #6b8f5e;
      --gold:       #d4af37;
      --text-dark:  #161515;
      --text-mid:   #5a5a5a;
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    /* Leaf decorations */
    .leaf {
      position: fixed;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      z-index: 0;
      -webkit-mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
      mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
    }
    .leaf.tl { top: 0; left: 0;  width: 56%; transform: none; }
    .leaf.tr { top: 0; right: 0; width: 56%; transform: scaleX(-1); }
    .leaf.bl { bottom: 0; left: 0;  width: 50%; transform: rotate(180deg) scaleX(-1); }
    .leaf.br { bottom: 0; right: 0; width: 50%; transform: rotate(180deg); }

    /* 3D Envelope */
    .envelope-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      height: 240px;
      margin-bottom: 40px;
      cursor: pointer;
      perspective: 1200px;
    }

    .envelope-3d {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .envelope-3d.open {
      transform: rotateX(-35deg) rotateZ(0deg);
    }

    /* Envelope Back (trasera) */
    .envelope-back {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b8f5e 0%, #768566 50%, #5d7a57 100%);
      border-radius: 4px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    /* Envelope Body (frente cerrado) */
    .envelope-front {
      position: absolute;
      width: 100%;
      height: 55%;
      bottom: 0;
      background: linear-gradient(to bottom, #768566, #6b8f5e);
      z-index: 5;
      border-radius: 0 0 4px 4px;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* Top Flap Container */
    .flap-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 45%;
      z-index: 10;
      transform-style: preserve-3d;
    }

    /* Top Flap */
    .flap-top-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #768566, #6b8f5e);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      transform-origin: top center;
      transition: transform 0.6s ease-out;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.15);
      border-radius: 4px 4px 0 0;
    }

    .envelope-3d.open .flap-top-content {
      transform: rotateX(180deg);
    }

    /* Left Triangle */
    .flap-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 45%;
      z-index: 8;
      transform-style: preserve-3d;
    }

    .flap-left-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b8f5e 0%, #768566 100%);
      clip-path: polygon(0 0, 100% 50%, 100% 100%, 0 100%);
      transform-origin: left center;
      transition: transform 0.7s ease-out 0.1s;
      box-shadow: inset 1px 1px 5px rgba(0, 0, 0, 0.2);
    }

    .envelope-3d.open .flap-left-content {
      transform: rotateY(-150deg);
    }

    /* Right Triangle */
    .flap-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 45%;
      z-index: 8;
      transform-style: preserve-3d;
    }

    .flap-right-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(225deg, #6b8f5e 0%, #768566 100%);
      clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%);
      transform-origin: right center;
      transition: transform 0.7s ease-out 0.1s;
      box-shadow: inset -1px 1px 5px rgba(0, 0, 0, 0.2);
    }

    .envelope-3d.open .flap-right-content {
      transform: rotateY(150deg);
    }

    /* Seal */
    .seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #ffd966, #f4d03f 20%, #d4af37 50%, #c9a227 80%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5), 
                  inset -3px -3px 8px rgba(0, 0, 0, 0.15),
                  inset 2px 2px 5px rgba(255, 255, 255, 0.2);
      color: #2c2c2c;
      font-weight: bold;
      z-index: 11;
      animation: floatSeal 3s ease-in-out infinite;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -58px) scale(1.02); }
    }

    /* Dashed line decoration */
    .dashed-line {
      position: absolute;
      width: 70%;
      height: 1px;
      left: 50%;
      transform: translateX(-50%);
      background: repeating-linear-gradient(
        to right,
        rgba(255,255,255,0.4) 0px,
        rgba(255,255,255,0.4) 5px,
        transparent 5px,
        transparent 10px
      );
      z-index: 4;
    }

    .dashed-line-1 { bottom: 58%; }
    .dashed-line-2 { bottom: 28%; }

    /* CTA Text */
    .cta-text {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      z-index: 7;
      white-space: nowrap;
      font-weight: 300;
    }

    /* Letter Content */
    .letter {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 340px;
      background: white;
      border-radius: 4px;
      padding: 35px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      z-index: 3;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s ease-out 0.5s;
    }

    .envelope-3d.open .letter {
      opacity: 1;
      visibility: visible;
      top: -120px;
    }

    .letter h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      color: var(--gold);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .letter p {
      font-family: 'Luxurious Script', cursive;
      font-size: clamp(1.3rem, 2.5vw, 1.7rem);
      color: var(--green-dark);
      margin: 3px 0;
    }

    .letter .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      color: var(--text-mid);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* Subtitle */
    .subtitle-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--text-mid);
      letter-spacing: 0.1em;
      animation: fadeIn 0.8s ease-out;
    }

    .subtitle-text strong {
      color: var(--green-dark);
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Loader */
    .loader {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
    }

    .loader.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(118, 133, 102, 0.2);
      border-top: 4px solid var(--green-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .envelope-container {
        max-width: 320px;
        height: 200px;
      }

      .letter {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <!-- Leaf decorations -->
  <img class="leaf tl" src="img/leaves.png" alt="" />
  <img class="leaf tr" src="img/leaves.png" alt="" />
  <img class="leaf bl" src="img/leaves.png" alt="" />
  <img class="leaf br" src="img/leaves.png" alt="" />

  <!-- Main Container -->
  <div class="container">
    <!-- 3D Envelope -->
    <div class="envelope-container" id="envelopeContainer">
      <div class="envelope-3d" id="envelope3d">
        
        <!-- Back -->
        <div class="envelope-back"></div>

        <!-- Front Body -->
        <div class="envelope-front"></div>

        <!-- Top Flap -->
        <div class="flap-top">
          <div class="flap-top-content"></div>
        </div>

        <!-- Left Triangle -->
        <div class="flap-left">
          <div class="flap-left-content"></div>
        </div>

        <!-- Right Triangle -->
        <div class="flap-right">
          <div class="flap-right-content"></div>
        </div>

        <!-- Dashed Lines -->
        <div class="dashed-line dashed-line-1"></div>
        <div class="dashed-line dashed-line-2"></div>

        <!-- Seal -->
        <div class="seal">✦</div>

        <!-- CTA Text -->
        <div class="cta-text">CLICK PARA ABRIR</div>

        <!-- Letter -->
        <div class="letter">
          <h2>NUESTRA BODA</h2>
          <p>Gabriela & Alejandro</p>
          <p class="date">24 - AGOSTO - 2025</p>
        </div>

      </div>
    </div>

    <!-- Subtitle -->
    <p class="subtitle-text">Hemos reservado <strong>2</strong> lugares en su honor</p>
  </div>

  <!-- Loading spinner -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <script>
    const envelopeContainer = document.getElementById('envelopeContainer');
    const envelope3d = document.getElementById('envelope3d');
    const loader = document.getElementById('loader');
    let isOpened = false;

    // Redirect URL
    const redirectUrl = 'index.html';

    envelopeContainer.addEventListener('click', function() {
      if (!isOpened) {
        isOpened = true;
        envelope3d.classList.add('open');
        loader.classList.add('show');

        // Redirect after animation
        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 2200);
      }
    });

    // Add hover effect
    envelopeContainer.addEventListener('mouseenter', function() {
      if (!isOpened) {
        envelopeContainer.style.transform = 'scale(1.04)';
        envelopeContainer.style.transition = 'transform 0.3s ease';
      }
    });

    envelopeContainer.addEventListener('mouseleave', function() {
      if (!isOpened) {
        envelopeContainer.style.transform = 'scale(1)';
      }
    });
  </script>
</body>
</html>
