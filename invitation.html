<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación - Gabriela & Alejandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --cream:      #fafcf2;
      --green-dark: #768566;
      --green-mid:  #6b8f5e;
      --gold:       #d4af37;
      --text-dark:  #161515;
      --text-mid:   #5a5a5a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    /* Leaf decorations */
    .leaf {
      position: fixed;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      z-index: 0;
      -webkit-mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
      mask-image: radial-gradient(ellipse at 0% 0%, black 30%, rgba(0,0,0,0.6) 52%, transparent 72%);
    }
    .leaf.tl { top: 0; left: 0;  width: 56%; transform: none; }
    .leaf.tr { top: 0; right: 0; width: 56%; transform: scaleX(-1); }
    .leaf.bl { bottom: 0; left: 0;  width: 50%; transform: rotate(180deg) scaleX(-1); }
    .leaf.br { bottom: 0; right: 0; width: 50%; transform: rotate(180deg); }

    /* Envelope Wrapper */
    .envelope-wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
      height: 280px;
      cursor: pointer;
      perspective: 1500px;
      margin-bottom: 40px;
    }

    .envelope {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .envelope.opened {
      transform: rotateX(-150deg);
    }

    /* Envelope Body - Base Verde */
    .envelope-body {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b8f5e 0%, #768566 50%, #5d7a57 100%);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 25px;
      padding-bottom: 30px;
      backface-visibility: hidden;
    }

    .envelope-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      border-radius: 8px;
      pointer-events: none;
    }

    /* Flap Superior */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(180deg, #768566 0%, #6b8f5e 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.8s ease-out 0.1s;
      backface-visibility: hidden;
      z-index: 10;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .envelope.opened .flap {
      transform: rotateX(180deg);
    }

    /* Sello Dorado */
    .seal {
      position: relative;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #ffd966, #f4d03f 25%, #d4af37 60%, #c9a227 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow: 0 12px 32px rgba(212, 175, 55, 0.45),
                  inset -2px -2px 8px rgba(0, 0, 0, 0.2),
                  inset 1px 1px 3px rgba(255, 255, 255, 0.15);
      color: #2c2c2c;
      font-weight: bold;
      z-index: 11;
      animation: floatSeal 3s ease-in-out infinite;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Línea punteada */
    .dashed-line {
      position: relative;
      width: 70%;
      height: 1px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.3),
        rgba(255,255,255,0.3) 6px,
        transparent 6px,
        transparent 12px
      );
      z-index: 5;
    }

    /* Texto CTA */
    .cta-text {
      position: relative;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 300;
      z-index: 8;
    }

    /* Carta Interior */
    .letter {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 320px;
      background: var(--cream);
      border-radius: 6px;
      padding: 40px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transition: all 0.7s ease-out 0.6s;
      z-index: 3;
      backface-visibility: hidden;
    }

    .envelope.opened .letter {
      opacity: 1;
      visibility: visible;
      top: -140px;
    }

    .letter h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--gold);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .letter p {
      font-family: 'Luxurious Script', cursive;
      font-size: clamp(1.2rem, 2.2vw, 1.6rem);
      color: var(--green-dark);
      margin: 3px 0;
    }

    .letter .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.65rem, 1.5vw, 0.8rem);
      color: var(--text-mid);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      color: var(--text-mid);
      letter-spacing: 0.08em;
      text-align: center;
    }

    .subtitle strong {
      color: var(--green-dark);
      font-weight: 600;
    }

    /* Hover effect */
    .envelope-wrapper:hover {
      transform: scale(1.03);
      transition: transform 0.3s ease;
    }

    /* Loader */
    .loader {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
    }

    .loader.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(118, 133, 102, 0.2);
      border-top: 4px solid var(--green-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .envelope-wrapper {
        max-width: 300px;
        height: 240px;
      }

      .letter {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Leaf decorations -->
  <img class="leaf tl" src="img/leaves.png" alt="" />
  <img class="leaf tr" src="img/leaves.png" alt="" />
  <img class="leaf bl" src="img/leaves.png" alt="" />
  <img class="leaf br" src="img/leaves.png" alt="" />

  <!-- Main Container -->
  <div class="container">
    <!-- Envelope -->
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope" id="envelope">
        
        <!-- Envelope Body -->
        <div class="envelope-body">
          <!-- Seal -->
          <div class="seal">✦</div>
          
          <!-- Dashed Line -->
          <div class="dashed-line"></div>
          
          <!-- CTA Text -->
          <div class="cta-text">CLICK PARA ABRIR</div>
        </div>

        <!-- Top Flap -->
        <div class="flap"></div>

        <!-- Letter Inside -->
        <div class="letter">
          <h2>NUESTRA BODA</h2>
          <p>Gabriela & Alejandro</p>
          <p class="date">24 - AGOSTO - 2025</p>
        </div>

      </div>
    </div>

    <!-- Subtitle -->
    <p class="subtitle">Hemos reservado <strong>2</strong> lugares en su honor</p>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <script>
    const envelopeWrapper = document.getElementById('envelopeWrapper');
    const envelope = document.getElementById('envelope');
    const loader = document.getElementById('loader');
    let isOpened = false;

    const redirectUrl = 'index.html';

    envelopeWrapper.addEventListener('click', function() {
      if (!isOpened) {
        isOpened = true;
        envelope.classList.add('opened');
        loader.classList.add('show');

        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 2200);
      }
    });
  </script>
</body>
</html>
